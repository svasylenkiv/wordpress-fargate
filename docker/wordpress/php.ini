; ─── OPcache (critical для продакшн продуктивності) ─────────────────────────
opcache.enable=1
opcache.memory_consumption=256
opcache.interned_strings_buffer=16
opcache.max_accelerated_files=10000
opcache.revalidate_freq=0
opcache.validate_timestamps=0
; ↑ У продакшені validate_timestamps=0 — не перевіряти файли кожен запит.
;   При деплої нової версії треба скидати opcache (або перезапускати контейнер).

; ─── Ліміти для WordPress ─────────────────────────────────────────────────────
memory_limit=512M
upload_max_filesize=64M
post_max_size=64M
max_execution_time=300
max_input_time=300
max_input_vars=3000

; ─── Безпека ──────────────────────────────────────────────────────────────────
expose_php=Off
display_errors=Off
log_errors=On
error_log=/proc/self/fd/2
; ↑ Логи йдуть у stderr → Docker → CloudWatch (готово для AWS)

; ─── Сесії ────────────────────────────────────────────────────────────────────
session.cookie_httponly=1
session.cookie_secure=1
session.use_strict_mode=1

; ─── Timezone ─────────────────────────────────────────────────────────────────
date.timezone=Europe/Kiev