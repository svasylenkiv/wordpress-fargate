# ─── Upstream: WordPress php-fpm ─────────────────────────────────────────────
# В docker compose — ім'я сервісу "wordpress" резолвиться в IP контейнера.
# На AWS Fargate sidecar — це буде 127.0.0.1:9000 (той самий task).
upstream php_fpm {
    server wordpress:9000;
    keepalive 16;
}

# ─── Gzip стиснення ───────────────────────────────────────────────────────────
gzip on;
gzip_vary on;
gzip_proxied any;
gzip_comp_level 6;
gzip_types
    text/plain text/css text/xml text/javascript
    application/json application/javascript application/xml+rss
    application/atom+xml image/svg+xml;

# ─── Main server block ────────────────────────────────────────────────────────
server {
    listen 80;
    server_name localhost;

    root  /var/www/html;
    index index.php index.html;

    client_max_body_size 64M;

    # ── Security headers ──────────────────────────────────────────────────────
    add_header X-Frame-Options          "SAMEORIGIN"                always;
    add_header X-Content-Type-Options   "nosniff"                   always;
    add_header X-XSS-Protection         "1; mode=block"             always;
    add_header Referrer-Policy          "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy       "geolocation=(), microphone=(), camera=()" always;
    # HSTS — вмикаємо тільки якщо є HTTPS (на AWS буде)
    # add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # ── Health check endpoint (для ALB та Docker HEALTHCHECK) ─────────────────
    location = /nginx-health {
        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }

    # ── Заблокувати доступ до чутливих файлів ────────────────────────────────
    location ~ /\.(ht|git|env|svn|DS_Store) {
        deny all;
        return 404;
    }

    # ── Заблокувати xmlrpc.php (часта ціль brute force) ───────────────────────
    location = /xmlrpc.php {
        deny all;
        return 403;
    }

    # ── Захистити wp-config.php ───────────────────────────────────────────────
    location = /wp-config.php {
        deny all;
        return 403;
    }

    # ── Захистити wp-includes від прямого доступу ─────────────────────────────
    location ~* /wp-includes/.*\.php$ {
        deny all;
        return 403;
    }

    # ── WordPress: спробуй файл → директорію → index.php ─────────────────────
    location / {
        try_files $uri $uri/ /index.php?$args;
    }

    # ── PHP обробка ───────────────────────────────────────────────────────────
    location ~ \.php$ {
        # Захист від Nginx PHP path info vulnerability
        try_files $uri =404;
        fastcgi_split_path_info ^(.+\.php)(/.+)$;

        fastcgi_pass   php_fpm;
        fastcgi_index  index.php;

        include        fastcgi_params;
        fastcgi_param  SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param  PATH_INFO       $fastcgi_path_info;

        # Таймаути для повільних WP запитів (крон, імпорти)
        fastcgi_connect_timeout 60s;
        fastcgi_send_timeout    300s;
        fastcgi_read_timeout    300s;

        # Буферизація відповідей
        fastcgi_buffers         16 16k;
        fastcgi_buffer_size     32k;
    }

    # ── Статичні файли — агресивне кешування ─────────────────────────────────
    location ~* \.(css|gif|ico|jpeg|jpg|js|mp4|ogg|ogv|png|svg|webm|webp|woff|woff2)$ {
        expires     max;
        log_not_found off;
        access_log  off;
        add_header  Cache-Control "public, immutable";
    }

    # ── WordPress uploads — заборонити PHP в uploads ──────────────────────────
    location ~* /(?:uploads|files)/.*\.php$ {
        deny all;
        return 403;
    }

    # ── Логи ──────────────────────────────────────────────────────────────────
    access_log  /var/log/nginx/access.log  combined;
    error_log   /var/log/nginx/error.log   warn;
}
