# docker-compose.yml
# Production-like конфіг. Dev overrides — у docker-compose.override.yml

services:

  # ────────────────────────────────────────────────────────────────────────────
  nginx:
    build:
      context: ./docker/nginx
      dockerfile: Dockerfile
    image: wordpress-nginx:local
    container_name: wp_nginx
    ports:
      - "80:80"
    volumes:
      # ro — nginx тільки читає статику, не пише
      - wp_data:/var/www/html:ro
    depends_on:
      wordpress:
        condition: service_healthy
    networks:
      - wp_net
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # ────────────────────────────────────────────────────────────────────────────
  wordpress:
    build:
      context: ./docker/wordpress
      dockerfile: Dockerfile
    image: wordpress-app:local
    container_name: wp_app
    # Порт 9000 НЕ expose на хост — тільки через wp_net до nginx
    expose:
      - "9000"
    volumes:
      - wp_data:/var/www/html
    environment:
      # Database
      WORDPRESS_DB_HOST:     "db:3306"
      WORDPRESS_DB_NAME:     "${DB_NAME}"
      WORDPRESS_DB_USER:     "${DB_USER}"
      WORDPRESS_DB_PASSWORD: "${DB_PASSWORD}"
      WORDPRESS_TABLE_PREFIX: "${WP_TABLE_PREFIX:-wp_}"
      # WordPress salts (беруться з .env)
      WORDPRESS_AUTH_KEY:         "${WP_AUTH_KEY}"
      WORDPRESS_SECURE_AUTH_KEY:  "${WP_SECURE_AUTH_KEY}"
      WORDPRESS_LOGGED_IN_KEY:    "${WP_LOGGED_IN_KEY}"
      WORDPRESS_NONCE_KEY:        "${WP_NONCE_KEY}"
      WORDPRESS_AUTH_SALT:        "${WP_AUTH_SALT}"
      WORDPRESS_SECURE_AUTH_SALT: "${WP_SECURE_AUTH_SALT}"
      WORDPRESS_LOGGED_IN_SALT:   "${WP_LOGGED_IN_SALT}"
      WORDPRESS_NONCE_SALT:       "${WP_NONCE_SALT}"
      # Site URLs
      WORDPRESS_CONFIG_EXTRA: |
        define('WP_HOME', '${WP_HOME:-http://localhost}');
        define('WP_SITEURL', '${WP_SITEURL:-http://localhost}');
        define('WP_DEBUG', ${WP_DEBUG:-false});
        define('WP_DEBUG_LOG', false);
        define('DISALLOW_FILE_EDIT', true);
        define('WP_AUTO_UPDATE_CORE', false);
        @ini_set('upload_max_size', '64M');
    depends_on:
      db:
        condition: service_healthy
    networks:
      - wp_net
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # ────────────────────────────────────────────────────────────────────────────
  db:
    image: mariadb:10.11
    container_name: wp_db
    # Порт 3306 НЕ expose на хост (тільки у wp_net)
    expose:
      - "3306"
    volumes:
      - db_data:/var/lib/mysql
    environment:
      MYSQL_ROOT_PASSWORD: "${DB_ROOT_PASSWORD}"
      MYSQL_DATABASE:      "${DB_NAME}"
      MYSQL_USER:          "${DB_USER}"
      MYSQL_PASSWORD:      "${DB_PASSWORD}"
      # Charset для коректного Unicode (emoji та кирилиця)
      MYSQL_CHARSET:       "utf8mb4"
      MYSQL_COLLATION:     "utf8mb4_unicode_ci"
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout:  5s
      retries:  5
      start_period: 30s
    networks:
      - wp_net
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

# ──────────────────────────────────────────────────────────────────────────────
volumes:
  wp_data:
    name: wordpress_wp_data
  db_data:
    name: wordpress_db_data

networks:
  wp_net:
    name: wordpress_network
    driver: bridge
    # Ізольована мережа — зовні доступний тільки nginx:80