name: Test AWS OIDC Connection

on:
  workflow_dispatch:   # тільки ручний запуск

permissions:
  id-token: write
  contents: read

jobs:
  test-oidc:
    runs-on: ubuntu-latest
    steps:
      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.TERRAFORM_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}
          role-session-name: GitHubActionsOIDCTest

      - name: Verify AWS identity
        run: |
          aws sts get-caller-identity
          echo "✅ OIDC authentication successful!"

      - name: Test S3 access (tfstate bucket)
        run: |
          aws s3 ls s3://wordpress-fargate-tfstate-${{ secrets.AWS_ACCOUNT_ID }}/ \
            --recursive --human-readable
          echo "✅ S3 tfstate bucket accessible!"